<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-12 px-4">

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl shadow-slate-200/60 overflow-hidden border border-slate-100">
    <div class="p-8">
        <div class="flex items-center gap-3 mb-6">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <i data-lucide="check-circle-2" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Habit Tracker</h1>
        </div>

        <div class="flex gap-2 mb-8">
            <input id="habitInput" type="text" placeholder="What's your next habit?"
                class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-slate-600 placeholder:text-slate-400">
            <button onclick="addHabit()"
                class="bg-indigo-600 hover:bg-indigo-700 text-white p-2.5 rounded-xl transition-colors shadow-lg shadow-indigo-200 flex items-center justify-center">
                <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="mb-8">
            <div class="flex justify-between items-end mb-2">
                <span class="text-sm font-semibold text-slate-500 uppercase tracking-wider" id="stats">0/0 completed</span>
                <span class="text-sm font-bold text-indigo-600" id="percent">0%</span>
            </div>
            <div class="h-3 bg-slate-100 rounded-full overflow-hidden">
                <div id="bar" class="h-full bg-indigo-600 transition-all duration-500 ease-out shadow-[0_0_12px_rgba(79,70,229,0.4)]" style="width: 0%"></div>
            </div>
        </div>

        <ul id="list" class="space-y-3 mb-8">
            <!-- Habits will appear here -->
        </ul>

        <div class="grid grid-cols-3 gap-3 border-t border-slate-100 pt-8">
            <button onclick="exportData()" class="flex flex-col items-center gap-1.5 p-3 rounded-xl hover:bg-slate-50 transition-colors text-slate-600">
                <i data-lucide="download" class="w-5 h-5"></i>
                <span class="text-xs font-semibold">Export</span>
            </button>
            <button onclick="document.getElementById('file').click()" class="flex flex-col items-center gap-1.5 p-3 rounded-xl hover:bg-slate-50 transition-colors text-slate-600">
                <i data-lucide="upload" class="w-5 h-5"></i>
                <span class="text-xs font-semibold">Import</span>
            </button>
            <button onclick="resetToday()" class="flex flex-col items-center gap-1.5 p-3 rounded-xl hover:bg-slate-50 transition-colors text-slate-600">
                <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                <span class="text-xs font-semibold">Reset</span>
            </button>
        </div>

        <input id="file" type="file" hidden>
    </div>
</div>

<script>
const KEY = "habit-tracker-v2";

const today = () => new Date().toISOString().slice(0, 10);
const yesterday = () => {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0, 10);
};

const load = () => {
    let data = JSON.parse(localStorage.getItem(KEY) || '{"date":"","habits":[]}');
    const t = today();
    const y = yesterday();

    if (data.date !== t) {
        data.habits.forEach(h => {
            // If not done yesterday (or today), reset streak
            if (h.lastDoneDate !== y && h.lastDoneDate !== t) {
                h.streak = 0;
            }
            h.done = false;
        });
        data.date = t;
        save(data);
    }

    return data;
}

const save = data => localStorage.setItem(KEY, JSON.stringify(data));

const state = load();

function render() {
    const ul = document.getElementById("list");
    ul.innerHTML = "";

    if (state.habits.length === 0) {
        ul.innerHTML = `
            <li class="py-8 text-center text-slate-400">
                <p class="text-sm">No habits yet. Add one above!</p>
            </li>
        `;
    }

    state.habits.forEach((habit, i) => {
        const li = document.createElement("li");
        li.className = "group flex items-center gap-4 p-4 rounded-xl border border-slate-100 hover:border-indigo-100 hover:bg-indigo-50/30 transition-all";

        li.innerHTML = `
            <label class="relative flex items-center cursor-pointer">
                <input type="checkbox" class="peer sr-only" ${habit.done ? "checked" : ""}>
                <div class="w-6 h-6 border-2 border-slate-200 rounded-lg peer-checked:bg-indigo-600 peer-checked:border-indigo-600 transition-all flex items-center justify-center">
                    <i data-lucide="check" class="text-white w-4 h-4 hidden peer-checked:block"></i>
                </div>
            </label>
            <div class="flex-1 min-w-0">
                <p class="text-slate-700 font-semibold truncate ${habit.done ? 'line-through text-slate-400' : ''}">${habit.name}</p>
                <div class="flex items-center gap-1.5 mt-0.5">
                    <i data-lucide="flame" class="w-3.5 h-3.5 ${habit.streak > 0 ? 'text-orange-500 fill-orange-500' : 'text-slate-300'}"></i>
                    <span class="text-xs font-bold ${habit.streak > 0 ? 'text-orange-600' : 'text-slate-400'}">${habit.streak || 0} day streak</span>
                </div>
            </div>
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                <button onclick="editHabit(${i})" class="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">
                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                </button>
                <button onclick="deleteHabit(${i})" class="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            </div>
        `;

        li.querySelector("input").onchange = e => {
            const checked = e.target.checked;
            habit.done = checked;
            if (checked) {
                habit.streak = (habit.streak || 0) + 1;
                habit.lastDoneDate = today();
            } else {
                habit.streak = Math.max(0, (habit.streak || 1) - 1);
                // Simple logic: if we uncheck, we just don't have it done today anymore.
                // We don't know the previous lastDoneDate easily without more state,
                // so we just clear it or set to yesterday.
                habit.lastDoneDate = yesterday();
            }
            update();
        };

        ul.appendChild(li);
    });

    const done = state.habits.filter(h => h.done).length;
    const total = state.habits.length;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById("bar").style.width = pct + "%";
    document.getElementById("stats").textContent = `${done}/${total} completed`;
    document.getElementById("percent").textContent = `${pct}%`;

    lucide.createIcons();
}

function update() {
    const prevDone = state.habits.filter(h => h.done).length;
    save(state);
    render();

    const newDone = state.habits.filter(h => h.done).length;
    if (newDone === state.habits.length && state.habits.length > 0 && newDone > prevDone) {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#4f46e5', '#818cf8', '#c7d2fe']
        });
    }
}

function addHabit() {
    const input = document.getElementById("habitInput");
    const name = input.value.trim();
    if (!name) return;

    state.habits.push({
        name,
        done: false,
        streak: 0,
        lastDoneDate: null
    });

    input.value = "";
    update();
}

function editHabit(i) {
    const newName = prompt("Edit habit name:", state.habits[i].name);
    if (newName !== null && newName.trim() !== "") {
        state.habits[i].name = newName.trim();
        update();
    }
}

function deleteHabit(i) {
    if (confirm(`Are you sure you want to delete "${state.habits[i].name}"?`)) {
        state.habits.splice(i, 1);
        update();
    }
}

function resetToday() {
    if (confirm("Reset all habits for today? Streaks will be affected.")) {
        state.habits.forEach(h => {
            if (h.done) {
                h.done = false;
                h.streak = Math.max(0, (h.streak || 1) - 1);
                h.lastDoneDate = yesterday();
            }
        });
        update();
    }
}

function exportData() {
    const blob = new Blob(
        [JSON.stringify(state, null, 2)],
        { type: "application/json" }
    );
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `habit-tracker-${today()}.json`;
    a.click();
}

document.getElementById("file").onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        try {
            const data = JSON.parse(reader.result);
            if (Array.isArray(data.habits)) {
                state.date = today();
                state.habits = data.habits;
                update();
            }
        } catch {
            alert("Invalid JSON");
        }
    };
    reader.readAsText(file);
};

render();
</script>

</body>
</html>
